<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body style="background:#0f172a;">
    <div id="myChart" style="height:400px; width:100%;"></div>
    <script>
        Plotly.newPlot('myChart', [{
            x: ['Mon', 'Tue', 'Wed'],
            y: [10, 20, 15],
            type: 'bar',
            marker: { color: '#4ade80' }
        }]);
    </script>
</body>
</html>
